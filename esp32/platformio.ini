; Jarvis for the ESP32-2432S028 ("Cheap Yellow Display" / CYD, 2.8" ILI9341).
;
;   pio run -t upload -t monitor
;
; Before building: copy include/config.example.h to include/config.h and fill in
; your Wi-Fi + Worker details (config.h is gitignored).

[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
	bodmer/TFT_eSPI@^2.5.43
	paulstoffregen/XPT2046_Touchscreen@^1.4
	bblanchon/ArduinoJson@^7.1.0

build_flags =
	; ---- TFT_eSPI display config for the CYD (2.8" ILI9341, SPI) ----
	; Configured here (not User_Setup.h) so the library needs no edits.
	-DUSER_SETUP_LOADED=1
	-DILI9341_2_DRIVER=1
	-DTFT_WIDTH=240
	-DTFT_HEIGHT=320
	-DTFT_MISO=12
	-DTFT_MOSI=13
	-DTFT_SCLK=14
	-DTFT_CS=15
	-DTFT_DC=2
	-DTFT_RST=-1
	-DTFT_BL=21
	-DTFT_BACKLIGHT_ON=HIGH
	-DLOAD_GLCD=1
	-DLOAD_FONT2=1
	-DLOAD_FONT4=1
	-DLOAD_GFXFF=1
	-DSMOOTH_FONT=1
	-DSPI_FREQUENCY=55000000
	-DSPI_READ_FREQUENCY=20000000
	; Touch (XPT2046) is driven on its own SPI bus in code, not by TFT_eSPI.
